<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nether Nodes — Host Like a Legend</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&amp;family=Orbitron:wght@700;900&amp;family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c1a;--panel:#0d1530;--panel2:#101d3a;
  --accent:#ff2d2d;--accent2:#c0392b;--accent3:#ff4444;--green:#4ade80;
  --text:#e2eaf8;--muted:#5a6e91;--muted2:#8899bb;
  --border:rgba(255,45,45,0.1);--border2:rgba(255,255,255,0.06);
  --banner-h:36px;--nav-h:56px;--top:92px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}

/* BG */
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 15% 20%,rgba(99,60,180,.18) 0%,transparent 55%),
    radial-gradient(ellipse 70% 45% at 85% 75%,rgba(60,80,200,.15) 0%,transparent 55%),
    radial-gradient(ellipse 60% 40% at 50% 50%,rgba(80,30,160,.08) 0%,transparent 60%),
    radial-gradient(ellipse 90% 60% at 70% 10%,rgba(180,20,20,.08) 0%,transparent 50%);
  pointer-events:none;}
body::after{content:'';position:fixed;inset:0;z-index:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.08) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none;opacity:.4;}

/* ── BANNER ── */
.banner{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--banner-h);
  background:linear-gradient(90deg,#3b0a0a,#6b1515,#3b0a0a);
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.3px;padding:0 12px;overflow:hidden;}
.bb{background:var(--accent3);color:#000;padding:1px 7px;border-radius:3px;font-size:.6rem;font-weight:800;letter-spacing:1px;white-space:nowrap;}
.bc{background:rgba(255,255,255,.12);padding:1px 8px;border-radius:3px;font-family:'Orbitron',sans-serif;font-size:.6rem;color:#ff6b6b;white-space:nowrap;}
.blink{background:var(--accent2);color:#fff;padding:3px 10px;border-radius:100px;font-size:.62rem;text-decoration:none;font-weight:700;white-space:nowrap;}

/* ── NAV ── */
nav{position:fixed;top:var(--banner-h);left:0;right:0;z-index:200;height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:rgba(5,8,16,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:2px;color:var(--accent);text-shadow:0 0 18px rgba(255,45,45,.45);text-decoration:none;}
.logo-d{color:rgba(226,234,248,.55);}
.ham{background:none;border:none;color:var(--text);font-size:1.4rem;padding:6px;cursor:pointer;display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
.ham span{display:block;background:var(--text);border-radius:2px;transition:all .3s;}
.ham span:nth-child(1){width:22px;height:2px;}
.ham span:nth-child(2){width:16px;height:2px;}
.ham span:nth-child(3){width:22px;height:2px;}
.ham.open span:nth-child(1){transform:translateY(7px) rotate(45deg);width:22px;}
.ham.open span:nth-child(2){opacity:0;transform:translateX(8px);}
.ham.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* MOBILE MENU DRAWER */
.drawer{position:fixed;top:calc(var(--banner-h) + var(--nav-h));left:0;right:0;bottom:0;z-index:190;
  background:rgba(5,8,16,.98);backdrop-filter:blur(20px);
  display:flex;flex-direction:column;padding:24px 20px;gap:4px;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;}
.drawer.open{transform:translateX(0);}
.drawer a{color:var(--muted2);text-decoration:none;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:1.1rem;letter-spacing:1.5px;text-transform:uppercase;padding:14px 0;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.drawer a:hover{color:var(--accent);}
.drawer .dcta{background:var(--accent);color:var(--bg)!important;padding:14px 20px;border-radius:8px;border:none!important;justify-content:center;margin-top:12px;font-weight:700;}

/* ── HERO ── */
.hero{padding:calc(var(--top) + 28px) 16px 48px;position:relative;overflow:hidden;z-index:1;}
.orb{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;animation:drift 12s ease-in-out infinite alternate;}
.o1{width:320px;height:320px;background:rgba(180,20,20,.18);top:-80px;right:-80px;}
.o2{width:280px;height:280px;background:rgba(255,45,45,.08);bottom:-60px;left:-80px;animation-delay:-5s;}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(20px,30px)}}

.eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(180,20,20,.18);border:1px solid rgba(180,20,20,.35);padding:5px 13px;border-radius:100px;font-family:'Rajdhani',sans-serif;font-size:.66rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ff8080;margin-bottom:20px;animation:fu .7s both;}
.edot{width:5px;height:5px;background:#ff8080;border-radius:50%;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:2.3rem;line-height:1.05;letter-spacing:-1px;margin-bottom:16px;animation:fu .7s .1s both;}
h1 .c{color:var(--accent);text-shadow:0 0 30px rgba(255,45,45,.45);}
h1 .v{color:#ff8080;}
.hero-desc{color:var(--muted2);font-size:.9rem;line-height:1.7;margin-bottom:28px;animation:fu .7s .15s both;}
.hero-desc strong{color:var(--accent);font-weight:500;}
.ctas{display:flex;flex-direction:column;gap:10px;animation:fu .7s .2s both;}
.btn-p{background:var(--accent);color:var(--bg);padding:14px;border-radius:8px;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 0 28px rgba(255,45,45,.25);transition:all .2s;position:relative;overflow:hidden;}
.btn-p:active{transform:scale(.97);}
.btn-o{background:transparent;color:var(--text);padding:13px;border-radius:8px;border:1px solid var(--border2);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.btn-o:active{background:rgba(255,45,45,.05);}

/* Hero stats */
.hstats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-top:36px;border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fu .7s .3s both;}
.hs{background:var(--panel);padding:14px 12px;}
.hsv{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent);}
.hsl{color:var(--muted);font-size:.66rem;letter-spacing:1px;text-transform:uppercase;margin-top:3px;}

/* Live server mini-panel */

/* ── TRUST STRIP ── */
.trust{background:var(--panel);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;overflow-x:auto;gap:20px;position:relative;z-index:1;scrollbar-width:none;}
.trust::-webkit-scrollbar{display:none;}
.ti{display:flex;align-items:center;gap:7px;font-family:'Rajdhani',sans-serif;font-size:.76rem;font-weight:600;color:var(--muted2);white-space:nowrap;flex-shrink:0;}
.ti strong{color:var(--text);}

/* ── SHARED SECTION STYLES ── */
section{position:relative;z-index:1;}
.sec{padding:52px 16px;}
.sec-head{margin-bottom:28px;}
.sec-tag{display:inline-block;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.66rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
h2{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.55rem;letter-spacing:-.3px;margin-bottom:8px;line-height:1.2;}
h2 .hl{color:var(--accent);}
h2 .vl{color:#ff8080;}
.sec-sub{color:var(--muted2);font-size:.86rem;line-height:1.7;}

/* ── WHY CARDS ── */
.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.wc{background:var(--panel);border:1px solid var(--border2);border-radius:14px;padding:18px 14px;transition:border-color .2s;}
.wc:active{border-color:rgba(255,45,45,.25);}
.wi{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:12px;}
.wi1{background:linear-gradient(135deg,#b91c1c,#ef4444);}
.wi2{background:linear-gradient(135deg,#991b1b,#dc2626);}
.wi3{background:linear-gradient(135deg,#059669,#10b981);}
.wi4{background:linear-gradient(135deg,#b45309,#f59e0b);}
.wi5{background:linear-gradient(135deg,#b91c1c,#f87171);}
.wi6{background:linear-gradient(135deg,#7f1d1d,#ef4444);}
.wt{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;margin-bottom:5px;}
.wd{color:var(--muted2);font-size:.78rem;line-height:1.55;}

/* ── PLAN CARDS ── */
.pg{display:flex;flex-direction:column;gap:12px;}
.pc{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 16px;position:relative;transition:border-color .2s,background .2s;box-shadow:0 4px 24px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.08);}
.pc.pop{border-color:rgba(192,57,43,.5);background:var(--panel2);}
.pc.pop::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#c0392b,transparent);border-radius:14px 14px 0 0;}
.pc.bv{border-color:rgba(220,38,38,.4);}
.pc.bv::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#ef4444,transparent);border-radius:14px 14px 0 0;}
.pc.eli{border-color:rgba(220,38,38,.45);}
.pc-badge{position:absolute;top:12px;right:12px;padding:2px 9px;border-radius:100px;font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.bpop{background:#c0392b;color:#fff;}
.bbv{background:#ef4444;color:#fff;}
.beli{background:linear-gradient(90deg,#dc2626,#ff2d2d);color:#fff;}
.ph{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.pe{font-size:1.1rem;}
.pname{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.98rem;}
.pspecs{border-top:1px solid rgba(255,255,255,.05);padding-top:10px;margin-bottom:12px;}
.sr{display:flex;justify-content:space-between;padding:4px 0;font-size:.78rem;border-bottom:1px solid rgba(255,255,255,.025);}
.sr:last-child{border-bottom:none;}
.sl{color:var(--muted);}
.sv{font-weight:500;}
.sv.g{color:var(--green);font-weight:600;}
.ppr{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;}
.po{color:var(--muted);font-size:.76rem;text-decoration:line-through;}
.pnew{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.45rem;}
.pper{color:var(--muted);font-size:.7rem;}
.ppay{color:var(--muted);font-size:.66rem;margin-bottom:12px;}
.btn-ord{width:100%;padding:11px;border-radius:8px;border:1px solid rgba(99,102,241,.4);background:rgba(79,70,229,.15);color:var(--text);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;}
.btn-ord:active{background:rgba(79,70,229,.35);}
.promo-l{text-align:center;margin-top:8px;font-size:.68rem;color:#ff6b6b;}
.promo-l strong{font-family:'Orbitron',sans-serif;font-size:.62rem;}

/* ── TABS ── */
.tabs{display:flex;gap:3px;background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:3px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:80px;padding:9px 4px;border-radius:7px;border:none;background:transparent;color:var(--muted2);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.8px;text-transform:uppercase;transition:all .2s;white-space:nowrap;}
.tab.on{background:var(--accent2);color:#fff;}

/* ── VPS ── */
.vps-g{display:flex;flex-direction:column;gap:12px;}
.vc{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px;box-shadow:0 4px 24px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.08);}
.vc.vfp{border-color:rgba(192,57,43,.4);}
.vc.veli{border-color:rgba(220,38,38,.4);}
.vc-vtag{display:inline-block;margin-bottom:8px;padding:2px 9px;border-radius:100px;font-family:'Rajdhani',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.vc-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:3px;}
.vc-sub{color:var(--muted);font-size:.74rem;margin-bottom:10px;}
.vc-row{display:flex;justify-content:space-between;align-items:center;}
.vc-ram{font-size:.8rem;color:var(--muted2);}
.vc-ram span{color:var(--text);font-weight:600;}
.vc-price{font-family:'Orbitron',sans-serif;font-size:1.35rem;font-weight:700;color:var(--accent);}
.vc-price small{font-size:.62rem;color:var(--muted);font-family:'Inter';font-weight:400;}
.vc-pay{color:var(--muted);font-size:.65rem;margin:8px 0 10px;}
.why-vps-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;}
.wv{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:600;}
.wvi{width:28px;height:28px;border-radius:7px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:.8rem;border:1px solid var(--border);flex-shrink:0;}

/* ── DOMAINS ── */
.dom-g{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.dc{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:14px 6px;text-align:center;transition:all .2s;}
.dc:active{border-color:rgba(255,45,45,.3);background:var(--panel2);}
.dext{font-family:'Orbitron',sans-serif;font-weight:700;font-size:.88rem;color:var(--accent);margin-bottom:4px;}
.dprice{color:var(--muted);font-size:.62rem;}

/* ── REVIEWS ── */
.rev-g{display:flex;flex-direction:column;gap:12px;}
.rv{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 16px;position:relative;}
.rq{position:absolute;top:14px;right:14px;font-size:2rem;color:rgba(255,45,45,.07);font-family:Georgia,serif;line-height:1;}
.rh{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ra{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.86rem;flex-shrink:0;}
.rname{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.88rem;}
.rgame{color:var(--muted);font-size:.7rem;}
.rstars{color:#ff6b6b;font-size:.78rem;letter-spacing:2px;margin-bottom:8px;}
.rtext{color:var(--muted2);font-size:.84rem;line-height:1.62;}

/* ── FAQ ── */
.faq-list{display:flex;flex-direction:column;gap:8px;}
.fi{background:var(--panel);border:1px solid var(--border2);border-radius:12px;overflow:hidden;transition:border-color .2s;}
.fi.open{border-color:rgba(255,45,45,.2);}
.fq{display:flex;justify-content:space-between;align-items:center;padding:15px 16px;background:none;border:none;width:100%;text-align:left;color:var(--text);font-size:.86rem;font-weight:500;gap:12px;cursor:pointer;}
.ficon{color:var(--muted);font-size:1.1rem;transition:transform .3s;flex-shrink:0;}
.fi.open .ficon{transform:rotate(45deg);color:var(--accent);}
.fa{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .3s;color:var(--muted2);font-size:.82rem;line-height:1.68;padding:0 16px;}
.fi.open .fa{max-height:150px;padding:0 16px 16px;}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:40px 16px 100px;position:relative;z-index:1;}
.fl{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.05rem;color:var(--accent);letter-spacing:2px;margin-bottom:10px;}
.fd{color:var(--muted2);font-size:.8rem;line-height:1.7;margin-bottom:16px;}
.fsoc{display:flex;gap:8px;margin-bottom:28px;}
.fsoc a{width:36px;height:36px;border-radius:9px;background:var(--panel2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:.9rem;text-decoration:none;}
.fcols{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px;}
.fcol h4{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.66rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.fcol a{display:block;color:var(--muted2);text-decoration:none;font-size:.8rem;margin-bottom:8px;}
.fcopy{color:var(--muted);font-size:.72rem;padding-top:20px;border-top:1px solid var(--border2);}
.fbadges{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.fbadge{background:var(--panel);border:1px solid var(--border2);border-radius:5px;padding:4px 10px;font-family:'Rajdhani',sans-serif;font-size:.62rem;font-weight:600;letter-spacing:.8px;color:var(--muted);}

/* ── STICKY BAR ── */
.sticky{position:fixed;bottom:0;left:0;right:0;z-index:190;background:rgba(5,8,16,.97);border-top:1px solid rgba(255,45,45,.2);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;backdrop-filter:blur(14px);}
.sticky-txt{font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:600;flex:1;min-width:0;}
.sticky-label{color:var(--accent);font-family:'Orbitron',sans-serif;font-size:.6rem;display:block;margin-bottom:1px;}
.sticky-code{color:#ff6b6b;font-family:'Orbitron',sans-serif;font-size:.68rem;}
.sticky-cta{background:linear-gradient(90deg,var(--accent2),#7f1d1d);color:#fff;padding:10px 16px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:1px;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.sticky-x{background:none;border:none;color:var(--muted);font-size:.95rem;padding:4px;flex-shrink:0;}

/* ── REVEAL ── */
.rv2{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease;}
.rv2.vis{opacity:1;transform:none;}

@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}


/* ── WELCOME POPUP ── */
.popup-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.45);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .4s;}
.popup-overlay.show{opacity:1;pointer-events:all;}
.popup-box{background:rgba(255,255,255,.08);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.18);border-radius:22px;width:100%;max-width:320px;padding:28px 22px 24px;text-align:center;transform:scale(.85) translateY(20px);transition:transform .4s cubic-bezier(.34,1.56,.64,1);position:relative;box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.15);}
.popup-overlay.show .popup-box{transform:scale(1) translateY(0);}
.popup-close{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);color:#fff;width:28px;height:28px;border-radius:50%;font-size:.85rem;display:flex;align-items:center;justify-content:center;}
.popup-icon{width:58px;height:58px;background:linear-gradient(135deg,rgba(124,58,237,.8),rgba(168,85,247,.8));backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 14px;}
